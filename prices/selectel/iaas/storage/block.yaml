apiVersion: cloudfinops.ru/v1alpha1
kind: PriceBook
metadata:
  provider: selectel
  layer: iaas
  service: storage
  category: iaas.storage.block
  title: Block storage
spec:
  meters:
  - sku: selectel.disk.network-hdd
    name: Сетевой базовый HDD
    meter: storage.block.capacity
    status: available
    pricingMode: unit
    region: Москва / ru-6a
    effectiveFrom: '2026-07-01'
    checkedAt: '2026-07-13'
    sourceRefs:
    - selectel.prices
    - selectel.calculator
    - selectel.compute-rules
    dimensions:
      poolDependent: true
      diskType: network-hdd
      performanceTier: hdd
      storageMedia: hdd
      storageInterface: sata
      storageTopology: network
    pricing:
      rate:
        amount: '0.0112'
        currency: RUB
        unit:
          quantity: GiB
          period: hour
        vat: included
        byteBasis: binary
