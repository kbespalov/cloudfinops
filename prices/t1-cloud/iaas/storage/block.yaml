  - sku: t1.disk.light
    name: Дисковое пространство Light
    meter: storage.block.capacity
    status: available
    pricingMode: unit
    region: Россия
    effectiveFrom: '2026-07-13'
    checkedAt: '2026-07-13'
    sourceRefs:
    - t1.rates-pdf-2026-07-13
    dimensions:
      published30Days: 3.66
      diskType: light
      nativePerformanceTier: light
      performanceTier: hdd
      storageMedia: hdd
      storageInterface: unknown
      storageTopology: network
      includedIops: 500
      maximumIops: 500
      iopsChargedSeparately: false
      vatRatePercent: 22
      nativeVat: excluded
    pricing:
      rate:
        amount: '0.00008472'
        currency: RUB
        unit:
          quantity: GiB
          period: minute
        vat: excluded
        byteBasis: binary
      normalized:
        amount: '0.0062015'
        unit:
          currency: RUB
          quantity: GiB
          period: hour
        formula: 0.00008472 × 60 × 1.22 VAT
        vat: included
    notes: Класс диска Light; до 500 IOPS включено в ставку.
