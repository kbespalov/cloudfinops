apiVersion: cloudfinops.ru/v1alpha1
kind: PriceBook
metadata:
  provider: cloud-ru
  layer: iaas
  service: storage
  category: iaas.storage.object
  title: Object storage
spec:
  meters:
  - sku: cloudru.object-storage.standard
    name: Объектное хранилище · Standard
    meter: storage.object.capacity
    status: available
    pricingMode: unit
    region: Россия
    effectiveFrom: '2026-06-29'
    checkedAt: '2026-07-13'
    sourceRefs:
    - cloudru.s3-pdf
    - cloudru.s3-rules
    dimensions:
      freeTierGiBMonth: 15
      storageClass: standard
      redundancy: multi-zone
      copies: 2
      verificationStatus: verified
      verificationMethod: official-tariff-pdf
      verifiedAt: '2026-07-13'
      vatRatePercent: 22
      nativeNetAmount: '1.5075'
      nativeBillingPeriod: month
    pricing:
      rate:
        amount: '1.83915'
        currency: RUB
        unit:
          quantity: GiB
          period: month
        vat: included
        byteBasis: binary
      normalized:
        amount: '1.83915'
        unit:
          currency: RUB
          quantity: GiB
          period: month
        formula: 1.5075 RUB excluding VAT × 1.22
        vat: included
    notes: Действующая ставка взята из тарифного PDF; 15 ГБ бесплатного объема подтверждены правилами
      тарификации.
