      redundancy: single-copy
      availability: zonal
    pricing:
      rate:
        amount: '1.1346'
        currency: RUB
        unit:
          quantity: GiB
          period: month
        vat: included
        byteBasis: binary
  - sku: cloudru.object-storage.cold
    name: Объектное хранилище · Cold
    meter: storage.object.capacity
