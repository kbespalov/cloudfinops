          period: month
        vat: included
        byteBasis: binary

  # Operations — Evolution Object Storage tariff PDF 260619 (₽ with VAT).
  # Native pack is 1 000 ops for all verbs; catalog stores ₽/request, UI shows /10k.
  - sku: cloudru.object-storage.standard.requests.put
    name: Объектное хранилище · Standard · PUT
    meter: storage.object.requests
    status: available
    pricingMode: unit
    region: Россия
    effectiveFrom: '2026-06-19'
    checkedAt: '2026-07-13'
    sourceRefs: [cloudru.s3-pdf, cloudru.s3-rules]
    dimensions:
      storageClass: standard
      operation: PUT
      nativeBillingStepRequests: 1000
      nativeAmountPerStep: '0.1098'
    pricing:
      rate:
        amount: '0.0001098'
        currency: RUB
        unit: {quantity: request, period: usage}
        vat: included
        byteBasis: not-applicable
    notes: PDF 0,1098 ₽ / 1 000 PUT (с НДС); LIST/POST по той же ставке.
  - sku: cloudru.object-storage.standard.requests.get
