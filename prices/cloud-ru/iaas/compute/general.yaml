        confidence: medium
        notPublished: true
        fit:
          scope: stable 100% vCPU flavor lattice
          exactOnSourceRows: true
      - targetMeter: compute.ram
        amount: '0.254675'
        unit:
          quantity: GiB-RAM
          period: hour
        vat: included
        method: multi-flavor-lattice
        sourceSkuRefs:
        - cloudru.compute.1vcpu-2gb
        - cloudru.compute.2vcpu-4gb
        - cloudru.compute.4vcpu-8gb
        - cloudru.compute.4vcpu-16gb
        - cloudru.compute.8vcpu-16gb
        - cloudru.compute.8vcpu-32gb
        formula: 1.22 × 0.20875 RUB/GiB-RAM-hour excluding VAT
        confidence: medium
        notPublished: true
        fit:
          scope: stable 100% vCPU flavor lattice
          exactOnSourceRows: true
