apiVersion: cloudfinops.ru/v1alpha1
kind: PriceBook
metadata:
  provider: vk-cloud
  layer: paas
  service: containers
  category: paas.containers.managed-kubernetes
  title: Managed Kubernetes
spec:
  meters:
  - sku: vk.kubernetes.master-vcpu
    name: Master CPU, Intel Cascade Lake
    meter: containers.kubernetes.control-plane.vcpu
    status: available
    pricingMode: unit
    region: Москва
    effectiveFrom: '2026-01-12'
    checkedAt: '2026-07-13'
    sourceRefs:
    - vk.pricelist
    - vk.k8s-rules
    dimensions:
      component: master vCPU
      cpuPlatformFamily: intel-cascade-lake
      published30Days: 983.51
    pricing:
      rate:
        amount: '0.022766'
        currency: RUB
        unit:
          quantity: vCPU
          period: minute
        vat: included
        byteBasis: not-applicable
      normalized:
        amount: '1.36596'
        unit:
          currency: RUB
          quantity: vCPU
          period: hour
        formula: 0.022766 × 60
        vat: included
    notes: >
      Цена за один vCPU мастера (Intel Cascade Lake). Чтобы сравнить с другими
      облаками, смотрите «Зональный мастер 2 vCPU / 4 ГиБ».
  - sku: vk.kubernetes.master-ram
    name: Master RAM
    meter: containers.kubernetes.control-plane.ram
    status: available
    pricingMode: unit
    region: Москва
    effectiveFrom: '2026-01-12'
    checkedAt: '2026-07-13'
    sourceRefs:
    - vk.pricelist
    - vk.k8s-rules
    dimensions:
      component: master-ram
      published30Days: 267.18
    pricing:
      rate:
        amount: '0.006185'
        currency: RUB
        unit:
          quantity: GiB-RAM
          period: minute
        vat: included
        byteBasis: binary
      normalized:
        amount: '0.3711'
        unit:
          currency: RUB
          quantity: GiB-RAM
          period: hour
        formula: 0.006185 × 60
        vat: included
    notes: >
      Цена за 1 ГиБ RAM мастера. Чтобы сравнить с другими облаками, смотрите
      «Зональный мастер 2 vCPU / 4 ГиБ».
  - sku: vk.kubernetes.master-basic-2-4.synthetic
    name: Зональный мастер 2 vCPU / 4 ГиБ
    meter: containers.kubernetes.control-plane
    status: available
    pricingMode: bundle
    region: Москва
    effectiveFrom: '2026-01-12'
    checkedAt: '2026-07-13'
    sourceRefs:
    - vk.pricelist
    - vk.k8s-rules
    priceProvenance: derived
    dimensions:
      comparabilityClass: synthetic-bundle
      comparableTier: basic
      availability: zonal
      faultTolerant: false
      topology: zonal
      masterCount: 1
      vcpu: 2
      ramGiB: 4
      synthetic: true
      syntheticFrom:
      - vk.kubernetes.master-vcpu
      - vk.kubernetes.master-ram
      vatRatePercent: 22
    pricing:
      rate:
        amount: '4.21632'
        currency: RUB
        unit:
          quantity: master
          period: hour
        vat: included
        byteBasis: not-applicable
      normalized:
        amount: '4.21632'
        unit:
          currency: RUB
          quantity: master
          period: hour
        formula: 2 × 1.36596 (vCPU) + 4 × 0.3711 (GiB-RAM)
        vat: included
    notes: >
      Собрали из ставок vCPU и RAM для сравнения с другими облаками.
      Размер мастера выбираете при создании кластера; worker-ноды — отдельно.
  - sku: vk.kubernetes.master-ha-2-4.synthetic
    name: Региональный мастер 3×(2 vCPU / 4 ГиБ)
    meter: containers.kubernetes.control-plane
    status: available
    pricingMode: bundle
    region: Москва
    effectiveFrom: '2026-01-12'
    checkedAt: '2026-07-13'
    sourceRefs:
    - vk.pricelist
    - vk.k8s-rules
    priceProvenance: derived
    dimensions:
      comparabilityClass: synthetic-bundle
      comparableTier: ha
      availability: regional
      faultTolerant: true
      topology: regional
      masterCount: 3
      vcpu: 2
      ramGiB: 4
      synthetic: true
      syntheticFrom:
      - vk.kubernetes.master-vcpu
      - vk.kubernetes.master-ram
      vatRatePercent: 22
    pricing:
      rate:
        amount: '12.64896'
        currency: RUB
        unit:
          quantity: master
          period: hour
        vat: included
        byteBasis: not-applicable
      normalized:
        amount: '12.64896'
        unit:
          currency: RUB
          quantity: master
          period: hour
        formula: 3 × (2 × 1.36596 + 4 × 0.3711)
        vat: included
    notes: >
      Собрали из ставок vCPU и RAM для трёх master-нод (отказоустойчивый вариант).
      Отдельной фиксированной платы за HA в прайсе нет; worker-ноды — отдельно.
