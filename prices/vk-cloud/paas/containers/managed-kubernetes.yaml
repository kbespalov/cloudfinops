      vatRatePercent: 22
      coverageNote: ram-not-published
    pricing:
      rate:
        amount: '8.19576'
        currency: RUB
        unit:
          quantity: master
          period: hour
        vat: included
        byteBasis: not-applicable
      normalized:
        amount: '8.19576'
        unit:
          currency: RUB
          quantity: master
          period: hour
        formula: 3 × 2 × 1.36596 (master vCPU-hour)
        vat: included
    notes: >
      Расчётная конфигурация отказоустойчивого мастера: 3×2 vCPU. Отдельной ставки за RAM
      мастера в публичном прайсе VK Cloud нет.
