apiVersion: cloudfinops.ru/v1alpha1
kind: PriceBook
metadata:
  provider: vk-cloud
  layer: iaas
  service: storage
  category: iaas.storage.object
  title: Object storage
spec:
  meters:
  - sku: vk.object-storage.hotbox
    name: Объектное хранилище · Standard
    meter: storage.object.capacity
    status: available
    pricingMode: unit
    region: Москва / ru-msk
    effectiveFrom: '2026-01-12'
    checkedAt: '2026-07-13'
    sourceRefs:
    - vk.pricelist
    - vk.s3-rules
    dimensions:
      storageClass: standard
      storageClassNative: Hotbox
      verificationStatus: verified
      verificationMethod: official-pricelist
      verifiedAt: '2026-07-13'
      vatRatePercent: 22
      nativeBillingPeriodDays: 30
      nativeMinuteAmount: '0.000053'
    pricing:
      rate:
        amount: '2.28'
        currency: RUB
        unit:
          quantity: GiB
          period: month
        vat: included
        byteBasis: binary
      normalized:
        amount: '2.28'
        unit:
          currency: RUB
          quantity: GiB
          period: month
        formula: published 30-day rate
        vat: included
    notes: >
      Hotbox = STANDARD. API-запросы официально не тарифицируются
      (см. SKU операций ниже со ставкой 0 ₽). Тарифицируются хранение и исходящий трафик.
  - sku: vk.object-storage.icebox
    name: Объектное хранилище · Cold
    meter: storage.object.capacity
    status: available
    pricingMode: unit
    region: Россия
    effectiveFrom: '2026-01-12'
    checkedAt: '2026-07-13'
    sourceRefs:
    - vk.pricelist
    - vk.s3-rules
    dimensions:
      storageClass: cold
      storageClassNative: Icebox
    pricing:
      rate:
        amount: '1.09'
        currency: RUB
        unit:
          quantity: GiB
          period: month
        vat: included
        byteBasis: binary
      normalized:
        amount: '1.09'
        unit:
          currency: RUB
          quantity: GiB
          period: month
        formula: published 30-day rate
        vat: included
    notes: >
      Icebox = COLD. API-запросы официально не тарифицируются
      (см. SKU операций ниже со ставкой 0 ₽).

  # API requests — explicitly priced at 0 ₽ for catalog parity.
  # Source: https://cloud.vk.com/docs/ru/storage/s3/tariffication
  # «Не тарифицируется → Использование API»
  - sku: vk.object-storage.hotbox.requests.put
    name: Объектное хранилище · Standard · PUT
    meter: storage.object.requests
    status: available
    pricingMode: unit
    region: Москва / ru-msk
    effectiveFrom: '2026-01-12'
    checkedAt: '2026-07-13'
    sourceRefs: [vk.s3-rules]
    dimensions:
      storageClass: standard
      storageClassNative: Hotbox
      operation: PUT
      nativeBillingStepRequests: 10000
      nativeAmountPerStep: '0'
    pricing:
      rate:
        amount: '0'
        currency: RUB
        unit: {quantity: request, period: usage}
        vat: included
        byteBasis: not-applicable
    notes: Официально API не тарифицируется; SKU зафиксирован как 0 ₽ / запрос для сравнения.
  - sku: vk.object-storage.hotbox.requests.get
    name: Объектное хранилище · Standard · GET
    meter: storage.object.requests
    status: available
    pricingMode: unit
    region: Москва / ru-msk
    effectiveFrom: '2026-01-12'
    checkedAt: '2026-07-13'
    sourceRefs: [vk.s3-rules]
    dimensions:
      storageClass: standard
      storageClassNative: Hotbox
      operation: GET
      nativeBillingStepRequests: 10000
      nativeAmountPerStep: '0'
    pricing:
      rate:
        amount: '0'
        currency: RUB
        unit: {quantity: request, period: usage}
        vat: included
        byteBasis: not-applicable
    notes: Официально API не тарифицируется; SKU зафиксирован как 0 ₽ / запрос для сравнения.
  - sku: vk.object-storage.icebox.requests.put
    name: Объектное хранилище · Cold · PUT
    meter: storage.object.requests
    status: available
    pricingMode: unit
    region: Россия
    effectiveFrom: '2026-01-12'
    checkedAt: '2026-07-13'
    sourceRefs: [vk.s3-rules]
    dimensions:
      storageClass: cold
      storageClassNative: Icebox
      operation: PUT
      nativeBillingStepRequests: 10000
      nativeAmountPerStep: '0'
    pricing:
      rate:
        amount: '0'
        currency: RUB
        unit: {quantity: request, period: usage}
        vat: included
        byteBasis: not-applicable
    notes: Официально API не тарифицируется; SKU зафиксирован как 0 ₽ / запрос для сравнения.
  - sku: vk.object-storage.icebox.requests.get
    name: Объектное хранилище · Cold · GET
    meter: storage.object.requests
    status: available
    pricingMode: unit
    region: Россия
    effectiveFrom: '2026-01-12'
    checkedAt: '2026-07-13'
    sourceRefs: [vk.s3-rules]
    dimensions:
      storageClass: cold
      storageClassNative: Icebox
      operation: GET
      nativeBillingStepRequests: 10000
      nativeAmountPerStep: '0'
    pricing:
      rate:
        amount: '0'
        currency: RUB
        unit: {quantity: request, period: usage}
        vat: included
        byteBasis: not-applicable
    notes: Официально API не тарифицируется; SKU зафиксирован как 0 ₽ / запрос для сравнения.
