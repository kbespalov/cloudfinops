      - yc.kubernetes.master-ram
      - yc.kubernetes.master-regional
      vatRatePercent: 22
    pricing:
      rate:
        amount: '16.08'
        currency: RUB
        unit:
          quantity: master
          period: hour
        vat: included
        byteBasis: not-applicable
      normalized:
        amount: '16.08'
        unit:
          currency: RUB
          quantity: master
          period: hour
        formula: 3 × (2 × 1.76 + 4 × 0.46 + 0 regional fixed)
        vat: included
    notes: >
      Собрали из ставок vCPU и RAM для трёх master-нод (фикс за региональный
      мастер — 0 ₽). Размер мастера выбираете при создании кластера;
      worker-ноды — отдельно.
