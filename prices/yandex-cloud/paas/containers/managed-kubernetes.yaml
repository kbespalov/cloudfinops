  - sku: yc.kubernetes.master-basic-2-4.synthetic
    name: Зональный мастер 2 vCPU / 4 ГиБ
    meter: containers.kubernetes.control-plane
    status: available
    pricingMode: bundle
    region: Россия
    effectiveFrom: '2026-05-01'
    checkedAt: '2026-07-17'
    sourceRefs:
    - yc.billing-api
    - yc.kubernetes
    priceProvenance: derived
    dimensions:
      comparabilityClass: synthetic-bundle
      comparableTier: basic
      availability: zonal
      faultTolerant: false
      topology: zonal
      masterCount: 1
      vcpu: 2
      ramGiB: 4
      synthetic: true
      syntheticFrom:
      - yc.kubernetes.master-vcpu
      - yc.kubernetes.master-ram
      - yc.kubernetes.master-zonal
      vatRatePercent: 22
    pricing:
      rate:
        amount: '5.36'
        currency: RUB
        unit:
          quantity: master
          period: hour
        vat: included
        byteBasis: not-applicable
      normalized:
        amount: '5.36'
        unit:
          currency: RUB
          quantity: master
          period: hour
