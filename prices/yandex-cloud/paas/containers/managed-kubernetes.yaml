        currency: RUB
        unit:
          quantity: GiB-RAM
          period: hour
        vat: included
        byteBasis: binary
      normalized:
        amount: '0.46'
        unit:
          currency: RUB
          quantity: GiB-RAM
          period: hour
        formula: native hourly rate
        vat: included
