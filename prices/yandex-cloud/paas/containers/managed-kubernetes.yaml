apiVersion: cloudfinops.ru/v1alpha1
kind: PriceBook
metadata:
  provider: yandex-cloud
  layer: paas
  service: containers
  category: paas.containers.managed-kubernetes
  title: Managed Kubernetes
spec:
  meters:
  - sku: yc.kubernetes.master-vcpu
    name: Master vCPU
    meter: containers.kubernetes.control-plane.vcpu
    status: available
    pricingMode: unit
    region: Россия
    effectiveFrom: '2026-05-01'
    checkedAt: '2026-07-17'
    sourceRefs:
    - yc.billing-api
    - yc.kubernetes
    dimensions:
      component: master-vcpu
      yandexSkuId: dn2pjj9vapo7724rik0b
      serviceId: dn2af04ph5otc5f23o1h
    pricing:
      rate:
        amount: '1.76'
        currency: RUB
        unit:
          quantity: vCPU
          period: hour
        vat: included
        byteBasis: not-applicable
      normalized:
        amount: '1.76'
        unit:
          currency: RUB
          quantity: vCPU
          period: hour
        formula: native hourly rate
        vat: included
    notes: >
      Цена за один vCPU мастера. Чтобы сравнить с другими облаками, смотрите
      «Зональный мастер 2 vCPU / 4 ГиБ».
  - sku: yc.kubernetes.master-ram
    name: Master RAM
    meter: containers.kubernetes.control-plane.ram
    status: available
    pricingMode: unit
    region: Россия
    effectiveFrom: '2026-05-01'
    checkedAt: '2026-07-17'
    sourceRefs:
