    region: Россия
    effectiveFrom: '2026-05-01'
    checkedAt: '2026-07-17'
    sourceRefs:
    - yc.billing-api
    - yc.kubernetes
    priceProvenance: derived
    dimensions:
      comparabilityClass: synthetic-bundle
      comparableTier: ha
      availability: regional
      faultTolerant: true
      topology: regional
